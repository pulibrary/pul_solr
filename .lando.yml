name: pul_solr
services:
  orangelight_test_solr:
    type: solr:8.4
    portforward: true
    core: blacklight-core
    config:
      dir: solr_configs/catalog-production-v2/conf
  pulmap_test_solr:
    type: solr:8.4
    portforward: true
    core: blacklight-core
    config:
      dir: solr_configs/pulmap/conf
proxy:
  orangelight_test_solr:
    - orangelight.test.solr.lndo.site:8983
  pulmap_test_solr:
    - pulmap.test.solr.lndo.site:8983
